<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Time App</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⏱️</text></svg>">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: { extend: {} }
    }
  </script>
  <style>
    body { background-color: #0f0f1a; }
    .gradient-text {
      background: linear-gradient(135deg, #a855f7, #ec4899, #06b6d4);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .card {
      background: rgba(26, 26, 46, 0.9);
      border: 1px solid rgba(168, 85, 247, 0.15);
    }
    .btn-primary {
      background: linear-gradient(135deg, #a855f7, #ec4899);
      transition: opacity 0.06s, transform 0.06s;
    }
    .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
    .btn-primary:active { transform: translateY(0); }
    button { transition-duration: 60ms !important; }
    .task-row {
      background: rgba(15, 15, 26, 0.6);
      border: 1px solid rgba(168, 85, 247, 0.1);
      transition: border-color 0.2s;
    }
    .task-row:hover { border-color: rgba(168, 85, 247, 0.3); }
    .task-row.running {
      border-color: rgba(6, 182, 212, 0.6) !important;
      background: rgba(6, 182, 212, 0.05);
    }
    .color-swatch {
      width: 26px; height: 26px;
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid transparent;
      transition: transform 0.15s, border-color 0.15s;
    }
    .color-swatch:hover { transform: scale(1.2); }
    .color-swatch.selected { border-color: white; transform: scale(1.2); }
    input[type="text"] {
      background: rgba(15, 15, 26, 0.8);
      border: 1px solid rgba(168, 85, 247, 0.3);
      color: #e2e8f0;
      border-radius: 0.5rem;
      padding: 0.5rem 0.75rem;
      outline: none;
      transition: border-color 0.2s;
      width: 100%;
    }
    input[type="text"]:focus { border-color: #a855f7; box-shadow: 0 0 0 2px rgba(168,85,247,0.2); }
    .timer-badge { font-variant-numeric: tabular-nums; letter-spacing: 0.05em; }
    .modal-backdrop { background: rgba(0,0,0,0.75); backdrop-filter: blur(4px); }
    /* Fallback display utilities in case Tailwind CDN is unavailable */
    .hidden { display: none !important; }
    .flex   { display: flex !important; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #0f0f1a; }
    ::-webkit-scrollbar-thumb { background: rgba(168,85,247,0.4); border-radius: 3px; }
    .pulse-ring { animation: pulse-ring 2s cubic-bezier(0.215,0.61,0.355,1) infinite; }
    @keyframes pulse-ring {
      0% { box-shadow: 0 0 0 0 rgba(6,182,212,0.4); }
      70% { box-shadow: 0 0 0 6px rgba(6,182,212,0); }
      100% { box-shadow: 0 0 0 0 rgba(6,182,212,0); }
    }
    /* Aurora background */
    @keyframes aurora1 { 0%,100%{transform:translate(0,0) scale(1)} 33%{transform:translate(55px,-35px) scale(1.08)} 66%{transform:translate(-25px,20px) scale(0.95)} }
    @keyframes aurora2 { 0%,100%{transform:translate(0,0) scale(1)} 33%{transform:translate(-45px,40px) scale(1.05)} 66%{transform:translate(35px,-25px) scale(0.97)} }
    @keyframes aurora3 { 0%,100%{transform:translate(0,0) scale(1)} 33%{transform:translate(25px,35px) scale(0.93)} 66%{transform:translate(-20px,-40px) scale(1.07)} }
    /* Card entrance */
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(28px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .card-enter { opacity: 0; animation: cardIn 0.5s cubic-bezier(0.16,1,0.3,1) forwards; }
    /* Modal entrance */
    @keyframes modalIn {
      from { opacity: 0; transform: scale(0.93) translateY(14px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }
    .modal-enter { animation: modalIn 0.35s cubic-bezier(0.16,1,0.3,1) forwards; }
    /* Animated gradient title */
    @keyframes gradientShift {
      0%,100% { background-position: 0% 50%; }
      50%     { background-position: 100% 50%; }
    }
    h1.gradient-text {
      background: linear-gradient(135deg, #a855f7, #ec4899, #06b6d4, #a855f7);
      background-size: 250% 250%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: gradientShift 5s ease infinite;
    }
  </style>
</head>
<body class="min-h-screen text-slate-200 font-sans">

  <!-- Aurora background -->
  <div aria-hidden="true" style="position:fixed;inset:0;overflow:hidden;pointer-events:none;z-index:-1;">
    <div style="position:absolute;width:700px;height:700px;top:-200px;left:-200px;background:#a855f7;border-radius:50%;filter:blur(130px);opacity:0.09;animation:aurora1 16s ease-in-out infinite;"></div>
    <div style="position:absolute;width:600px;height:600px;top:25%;right:-150px;background:#06b6d4;border-radius:50%;filter:blur(130px);opacity:0.07;animation:aurora2 21s ease-in-out infinite;"></div>
    <div style="position:absolute;width:500px;height:500px;bottom:-80px;left:30%;background:#ec4899;border-radius:50%;filter:blur(110px);opacity:0.07;animation:aurora3 18s ease-in-out infinite;"></div>
  </div>

  <!-- Header -->
  <header class="sticky top-0 z-50" style="background: rgba(15,15,26,0.95); border-bottom: 1px solid rgba(168,85,247,0.2); backdrop-filter: blur(10px);">
    <div class="max-w-5xl mx-auto px-4 py-3 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="w-8 h-8 rounded-lg btn-primary flex items-center justify-center text-white text-base">&#9201;</div>
        <h1 class="text-xl font-bold gradient-text">My Time App</h1>
      </div>
      <div class="flex items-center gap-4">
        <div class="text-right">
          <p class="text-xs text-slate-400">Today</p>
          <p id="daily-total" class="text-lg font-bold text-teal-400 timer-badge">00:00:00</p>
        </div>
      </div>
    </div>
  </header>

  <!-- Main -->
  <main class="max-w-5xl mx-auto px-4 py-8">
    <div id="empty-state" class="hidden flex-col items-center justify-center py-24 text-center">
      <div class="text-7xl mb-5">&#9201;&#65039;</div>
      <h2 class="text-2xl font-bold gradient-text mb-2">Start tracking your time</h2>
      <p class="text-slate-400 mb-6">Create your first project to get started.</p>
      <button onclick="openNewProjectModal()" class="btn-primary text-white font-semibold px-6 py-3 rounded-xl">
        + Create First Project
      </button>
    </div>
    <div id="new-project-btn-wrapper" class="hidden justify-end mb-6">
      <button onclick="openNewProjectModal()"
        class="text-sm font-semibold px-4 py-2 rounded-lg border border-purple-500/50 text-purple-300 hover:bg-purple-500/15 hover:border-purple-400 transition">
        + New Project
      </button>
    </div>
    <div id="projects-container" class="space-y-6"></div>
    <div id="export-btn-wrapper" class="hidden mt-8">
      <button onclick="exportCSV()"
        class="text-sm font-semibold px-4 py-2 rounded-lg border border-slate-600 text-slate-300 hover:border-purple-500 hover:text-purple-300 transition">
        &#8659; Export CSV
      </button>
    </div>
  </main>

  <!-- Footer -->
  <footer class="mt-12 pb-8 text-center">
    <p class="text-slate-600 text-sm">&#10024; Designed by Patri G &#10024;</p>
  </footer>

  <!-- New Project Modal -->
  <div id="project-modal" class="fixed inset-0 z-50 hidden items-center justify-center modal-backdrop">
    <div class="card rounded-2xl p-6 w-full max-w-md mx-4 shadow-2xl">
      <h2 class="text-xl font-bold mb-5 gradient-text">New Project</h2>
      <label for="project-name-input" class="block text-sm text-slate-400 mb-1">Project name</label>
      <input id="project-name-input" type="text" placeholder="e.g. Website Redesign" class="mb-4" maxlength="60" aria-label="Project name" />
      <label class="block text-sm text-slate-400 mb-2">Color</label>
      <div id="color-swatches" class="flex gap-3 flex-wrap mb-6"></div>
      <div class="flex gap-3 justify-end">
        <button onclick="closeProjectModal()" class="px-4 py-2 rounded-lg text-slate-400 hover:text-white hover:bg-white/10 transition text-sm">Cancel</button>
        <button onclick="saveProject()" class="btn-primary text-white font-semibold px-5 py-2 rounded-lg text-sm">Create Project</button>
      </div>
    </div>
  </div>

  <!-- Confirm Delete Modal -->
  <div id="confirm-modal" class="fixed inset-0 z-50 hidden items-center justify-center modal-backdrop">
    <div class="card rounded-2xl p-6 w-full max-w-sm mx-4 shadow-2xl">
      <h2 class="text-lg font-bold mb-2 text-red-400">Delete?</h2>
      <p id="confirm-message" class="text-slate-300 mb-5 text-sm"></p>
      <div class="flex gap-3 justify-end">
        <button onclick="closeConfirmModal()" class="px-4 py-2 rounded-lg text-slate-400 hover:text-white hover:bg-white/10 transition text-sm">Cancel</button>
        <button id="confirm-ok-btn" class="bg-red-500 hover:bg-red-600 text-white font-semibold px-5 py-2 rounded-lg text-sm transition">Delete</button>
      </div>
    </div>
  </div>

  <script>
    const STORAGE_KEY = 'myTimeAppData';
    const COLORS = ['#a855f7','#ec4899','#06b6d4','#10b981','#f59e0b','#ef4444','#3b82f6','#8b5cf6','#f97316','#14b8a6'];

    let data = { projects: [] };
    let activeTaskId = null;
    let activeProjectId = null;
    let timerInterval = null;
    let selectedColor = COLORS[0];
    let confirmCallback = null;

    // ── Export CSV ───────────────────────────────────────────────────────────
    function exportCSV() {
      const rows = [['Project', 'Task', 'Date', 'Start', 'End', 'Duration']];

      for (const project of data.projects) {
        for (const task of project.tasks) {
          for (const s of task.sessions) {
            const start = new Date(s.start);
            const end   = s.end ? new Date(s.end) : null;
            const dur   = end ? Math.max(0, end - start) : 0;
            const pad   = n => String(n).padStart(2, '0');
            const fmtDate = d => `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
            const fmtTime = d => `${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
            rows.push([
              project.name,
              task.name,
              fmtDate(start),
              fmtTime(start),
              end ? fmtTime(end) : 'running',
              formatDuration(dur)
            ]);
          }
        }
      }

      const csv = rows.map(r =>
        r.map(cell => '"' + String(cell).replace(/"/g, '""') + '"').join(',')
      ).join('\r\n');

      const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
      const url  = URL.createObjectURL(blob);
      const a    = document.createElement('a');
      a.href     = url;
      a.download = 'my-time-' + new Date().toISOString().slice(0, 10) + '.csv';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }

    // ── Persistence ──────────────────────────────────────────────────────────
    function loadData() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (raw) data = JSON.parse(raw);
        if (!data.projects) data.projects = [];
      } catch(e) { data = { projects: [] }; }
    }

    function saveData() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    }

    // ── UUID ─────────────────────────────────────────────────────────────────
    function uuid() {
      return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
        const r = Math.random() * 16 | 0;
        return (c === 'x' ? r : (r & 0x3 | 0x8)).toString(16);
      });
    }

    // ── Time helpers ─────────────────────────────────────────────────────────
    function formatDuration(ms) {
      if (ms < 0) ms = 0;
      const totalSec = Math.floor(ms / 1000);
      const h = Math.floor(totalSec / 3600);
      const m = Math.floor((totalSec % 3600) / 60);
      const s = totalSec % 60;
      return [h, m, s].map(v => String(v).padStart(2, '0')).join(':');
    }

    function sessionDuration(session) {
      const end = session.end ? new Date(session.end) : new Date();
      return Math.max(0, end - new Date(session.start));
    }

    function taskTotalMs(task) {
      return task.sessions.reduce((acc, s) => acc + sessionDuration(s), 0);
    }

    function isToday(dateStr) {
      const d = new Date(dateStr);
      const now = new Date();
      return d.getFullYear() === now.getFullYear() &&
             d.getMonth()    === now.getMonth()    &&
             d.getDate()     === now.getDate();
    }

    function dailyTotalMs() {
      let total = 0;
      for (const project of data.projects) {
        for (const task of project.tasks) {
          for (const s of task.sessions) {
            if (!isToday(s.start)) continue;
            total += sessionDuration(s);
          }
        }
      }
      return total;
    }

    // ── Timer loop ───────────────────────────────────────────────────────────
    function startTimerLoop() {
      if (timerInterval) return;
      timerInterval = setInterval(tickTimer, 1000);
    }

    function stopTimerLoop() {
      clearInterval(timerInterval);
      timerInterval = null;
    }

    function tickTimer() {
      if (!activeTaskId) { stopTimerLoop(); return; }
      const task = findTask(activeProjectId, activeTaskId);
      const el = document.getElementById('timer-' + activeTaskId);
      if (el && task) el.textContent = formatDuration(taskTotalMs(task));

      // Update goal progress bar live
      if (task && task.goal) {
        const total = taskTotalMs(task);
        const pct = Math.min(100, (total / task.goal) * 100);
        const isComplete = total >= task.goal;
        const barEl = document.getElementById('goal-bar-' + activeTaskId);
        const pctEl = document.getElementById('goal-pct-' + activeTaskId);
        if (barEl) {
          barEl.style.width = pct.toFixed(1) + '%';
          barEl.className = 'h-1.5 rounded-full transition-all duration-300 ' + (isComplete ? 'bg-emerald-400' : 'bg-purple-500');
        }
        if (pctEl) {
          pctEl.textContent = formatDuration(total) + ' / ' + formatDuration(task.goal) + (isComplete ? ' \u2713' : ' (' + Math.round(pct) + '%)');
          pctEl.className = 'flex-1 ' + (isComplete ? 'text-emerald-400 font-semibold' : 'text-slate-400');
        }
      }

      document.getElementById('daily-total').textContent = formatDuration(dailyTotalMs());
    }

    // ── Data helpers ─────────────────────────────────────────────────────────
    function findProject(pid) { return data.projects.find(p => p.id === pid); }

    function findTask(pid, tid) {
      const p = findProject(pid);
      return p ? p.tasks.find(t => t.id === tid) : null;
    }

    function findProjectOfTask(tid) {
      return data.projects.find(p => p.tasks.some(t => t.id === tid));
    }

    // ── Escape HTML ──────────────────────────────────────────────────────────
    function esc(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    // ── Project modal ────────────────────────────────────────────────────────
    function openNewProjectModal() {
      selectedColor = COLORS[0];
      renderColorSwatches();
      document.getElementById('project-name-input').value = '';
      document.getElementById('project-modal').classList.replace('hidden','flex');
      const card = document.querySelector('#project-modal > div');
      card.classList.remove('modal-enter'); void card.offsetWidth; card.classList.add('modal-enter');
      setTimeout(() => document.getElementById('project-name-input').focus(), 50);
    }

    function closeProjectModal() {
      document.getElementById('project-modal').classList.replace('flex','hidden');
    }

    function renderColorSwatches() {
      const container = document.getElementById('color-swatches');
      container.innerHTML = '';
      COLORS.forEach(c => {
        const div = document.createElement('div');
        div.className = 'color-swatch' + (c === selectedColor ? ' selected' : '');
        div.style.background = c;
        div.title = c;
        div.onclick = () => { selectedColor = c; renderColorSwatches(); };
        container.appendChild(div);
      });
    }

    function saveProject() {
      const name = document.getElementById('project-name-input').value.trim();
      if (!name) { document.getElementById('project-name-input').focus(); return; }
      data.projects.push({ id: uuid(), name, color: selectedColor, tasks: [] });
      saveData();
      closeProjectModal();
      render();
    }

    function deleteProject(pid) {
      openConfirmModal('Delete this project and all its tasks?', () => {
        if (activeProjectId === pid) stopActiveSession();
        data.projects = data.projects.filter(p => p.id !== pid);
        saveData();
        render();
      });
    }

    // ── Task CRUD ────────────────────────────────────────────────────────────
    function addTask(pid) {
      const input = document.getElementById('new-task-input-' + pid);
      if (!input) return;
      const name = input.value.trim();
      if (!name) { input.focus(); return; }
      const project = findProject(pid);
      if (!project) return;
      project.tasks.push({ id: uuid(), name, sessions: [] });
      saveData();
      input.value = '';
      renderProject(pid);
      document.getElementById('daily-total').textContent = formatDuration(dailyTotalMs());
    }

    function deleteTask(pid, tid) {
      openConfirmModal('Delete this task and all its time records?', () => {
        if (activeTaskId === tid) stopActiveSession();
        const project = findProject(pid);
        if (!project) return;
        project.tasks = project.tasks.filter(t => t.id !== tid);
        saveData();
        renderProject(pid);
        document.getElementById('daily-total').textContent = formatDuration(dailyTotalMs());
      });
    }

    function startEditTask(tid) {
      const nameEl  = document.getElementById('tname-' + tid);
      const inputEl = document.getElementById('tedit-' + tid);
      if (!nameEl || !inputEl) return;
      nameEl.classList.add('hidden');
      inputEl.classList.remove('hidden');
      inputEl.focus();
      inputEl.select();
    }

    function commitEditTask(tid) {
      const inputEl = document.getElementById('tedit-' + tid);
      const nameEl  = document.getElementById('tname-' + tid);
      if (!inputEl || !nameEl) return;
      const project = findProjectOfTask(tid);
      if (!project) return;
      const task = findTask(project.id, tid);
      if (!task) return;
      const newName = inputEl.value.trim();
      if (newName) task.name = newName;
      saveData();
      nameEl.textContent = task.name;
      nameEl.classList.remove('hidden');
      inputEl.classList.add('hidden');
    }

    function cancelEditTask(tid) {
      const inputEl = document.getElementById('tedit-' + tid);
      const nameEl  = document.getElementById('tname-' + tid);
      if (inputEl) inputEl.classList.add('hidden');
      if (nameEl)  nameEl.classList.remove('hidden');
    }

    // ── Timer controls ───────────────────────────────────────────────────────
    function startTask(pid, tid) {
      if (activeTaskId === tid) return;

      // Pause whatever is running
      if (activeTaskId) {
        const prevTask = findTask(activeProjectId, activeTaskId);
        if (prevTask) {
          const last = prevTask.sessions[prevTask.sessions.length - 1];
          if (last && !last.end) last.end = new Date().toISOString();
        }
        const prevPid = activeProjectId;
        activeTaskId = null;
        activeProjectId = null;
        stopTimerLoop();
        renderProject(prevPid);
      }

      const task = findTask(pid, tid);
      if (!task) return;
      task.sessions.push({ start: new Date().toISOString(), end: null });
      activeTaskId = tid;
      activeProjectId = pid;
      saveData();
      renderProject(pid);
      startTimerLoop();
      document.getElementById('daily-total').textContent = formatDuration(dailyTotalMs());
    }

    function pauseTask(pid, tid) {
      if (activeTaskId !== tid) return;
      const task = findTask(pid, tid);
      if (task) {
        const last = task.sessions[task.sessions.length - 1];
        if (last && !last.end) last.end = new Date().toISOString();
      }
      activeTaskId = null;
      activeProjectId = null;
      stopTimerLoop();
      saveData();
      renderProject(pid);
      document.getElementById('daily-total').textContent = formatDuration(dailyTotalMs());
    }

    function stopTask(pid, tid) {
      const task = findTask(pid, tid);
      if (!task) return;
      if (activeTaskId === tid) {
        const last = task.sessions[task.sessions.length - 1];
        if (last && !last.end) last.end = new Date().toISOString();
        activeTaskId = null;
        activeProjectId = null;
        stopTimerLoop();
      }
      // Remove zero-duration sessions
      task.sessions = task.sessions.filter(s => s.end && (new Date(s.end) - new Date(s.start)) > 0);
      saveData();
      renderProject(pid);
      document.getElementById('daily-total').textContent = formatDuration(dailyTotalMs());
    }

    function stopActiveSession() {
      if (!activeTaskId) return;
      const task = findTask(activeProjectId, activeTaskId);
      if (task) {
        const last = task.sessions[task.sessions.length - 1];
        if (last && !last.end) last.end = new Date().toISOString();
      }
      activeTaskId = null;
      activeProjectId = null;
      stopTimerLoop();
      saveData();
    }

    // ── Confirm modal ────────────────────────────────────────────────────────
    function openConfirmModal(message, callback) {
      document.getElementById('confirm-message').textContent = message;
      confirmCallback = callback;
      document.getElementById('confirm-modal').classList.replace('hidden','flex');
      const card = document.querySelector('#confirm-modal > div');
      card.classList.remove('modal-enter'); void card.offsetWidth; card.classList.add('modal-enter');
    }

    function closeConfirmModal() {
      confirmCallback = null;
      document.getElementById('confirm-modal').classList.replace('flex','hidden');
    }

    document.getElementById('confirm-ok-btn').onclick = () => {
      if (confirmCallback) confirmCallback();
      closeConfirmModal();
    };

    // ── Goal management ──────────────────────────────────────────────────────
    function openGoalInput(tid) {
      const area = document.getElementById('goal-input-' + tid);
      if (!area) return;
      area.classList.remove('hidden');
      area.classList.add('flex');
      const inp = document.getElementById('goal-hours-' + tid);
      if (inp) { inp.focus(); inp.select(); }
    }

    function cancelGoal(tid) {
      const area = document.getElementById('goal-input-' + tid);
      if (area) { area.classList.add('hidden'); area.classList.remove('flex'); }
    }

    function saveGoal(pid, tid) {
      const inp = document.getElementById('goal-hours-' + tid);
      if (!inp) return;
      const hours = parseFloat(inp.value);
      const task = findTask(pid, tid);
      if (!task) return;
      task.goal = (!isNaN(hours) && hours > 0) ? Math.round(hours * 3600000) : null;
      saveData();
      renderProject(pid);
    }

    function removeGoal(pid, tid) {
      const task = findTask(pid, tid);
      if (!task) return;
      task.goal = null;
      saveData();
      renderProject(pid);
    }

    // ── Render ───────────────────────────────────────────────────────────────
    function render() {
      const container  = document.getElementById('projects-container');
      const emptyState = document.getElementById('empty-state');

      const hasProjects = data.projects.length > 0;
      document.getElementById('new-project-btn-wrapper').classList.toggle('hidden', !hasProjects);
      document.getElementById('new-project-btn-wrapper').classList.toggle('flex', hasProjects);
      document.getElementById('export-btn-wrapper').classList.toggle('hidden', !hasProjects);

      if (!hasProjects) {
        container.innerHTML = '';
        emptyState.classList.remove('hidden');
        emptyState.classList.add('flex');
      } else {
        emptyState.classList.add('hidden');
        emptyState.classList.remove('flex');
        container.innerHTML = '';
        data.projects.forEach((p, i) => {
          const div = document.createElement('div');
          div.id = 'project-' + p.id;
          div.classList.add('card-enter');
          div.style.animationDelay = (i * 90) + 'ms';
          container.appendChild(div);
          renderProject(p.id);
        });
      }
      document.getElementById('daily-total').textContent = formatDuration(dailyTotalMs());
    }

    function renderProject(pid) {
      const project   = findProject(pid);
      const container = document.getElementById('project-' + pid);
      if (!project || !container) return;

      const totalMs   = project.tasks.reduce((acc, t) => acc + taskTotalMs(t), 0);
      const isRunning = activeProjectId === pid;

      const tasksHtml = project.tasks.length === 0
        ? '<p class="text-slate-500 text-sm text-center py-3">No tasks yet. Add one below.</p>'
        : project.tasks.map(t => taskHtml(pid, t)).join('');

      container.innerHTML = `
        <div class="card rounded-2xl overflow-hidden">
          <div class="flex items-center justify-between px-5 py-4" style="border-bottom:1px solid rgba(255,255,255,0.05)">
            <div class="flex items-center gap-3">
              <div class="w-3 h-3 rounded-full flex-shrink-0"
                   style="background:${project.color};box-shadow:0 0 8px ${project.color}99"></div>
              <h2 class="font-bold text-lg text-slate-100">${esc(project.name)}</h2>
              ${isRunning ? '<span class="text-xs bg-teal-500/20 text-teal-400 px-2 py-0.5 rounded-full border border-teal-500/30 animate-pulse">&#9679; running</span>' : ''}
            </div>
            <div class="flex items-center gap-3">
              <span class="text-sm text-slate-400 timer-badge">Total time: ${formatDuration(totalMs)}</span>
              <button onclick="deleteProject('${pid}')" title="Delete project" aria-label="Delete project"
                class="text-slate-500 hover:text-red-400 transition text-xl leading-none">&times;</button>
            </div>
          </div>
          <div class="px-5 py-4 space-y-2">${tasksHtml}</div>
          <div class="px-5 pb-4 flex gap-2">
            <input id="new-task-input-${pid}" type="text" placeholder="New task name&#8230;"
              class="flex-1 text-sm" maxlength="80" aria-label="New task name"
              onkeydown="if(event.key==='Enter') addTask('${pid}')" />
            <button onclick="addTask('${pid}')"
              class="btn-primary text-white text-sm font-semibold px-4 py-2 rounded-lg flex-shrink-0">+ Add</button>
          </div>
        </div>`;
    }

    function taskHtml(pid, task) {
      const isRunning = activeTaskId === task.id;
      const total     = taskTotalMs(task);
      const hasTime   = total > 0;

      const btnStart = `<button onclick="startTask('${pid}','${task.id}')"
        class="flex items-center gap-1 text-xs px-3 py-1.5 rounded-lg font-medium transition
               bg-emerald-500/20 text-emerald-400 hover:bg-emerald-500/40 border border-emerald-500/30"
        title="Start">&#9654; Start</button>`;

      const btnPause = `<button onclick="pauseTask('${pid}','${task.id}')"
        class="flex items-center gap-1 text-xs px-3 py-1.5 rounded-lg font-medium transition
               bg-amber-500/20 text-amber-400 hover:bg-amber-500/40 border border-amber-500/30"
        title="Pause">&#9646;&#9646; Pause</button>`;

      const btnStop = `<button onclick="stopTask('${pid}','${task.id}')"
        class="flex items-center gap-1 text-xs px-3 py-1.5 rounded-lg font-medium transition
               bg-red-500/20 text-red-400 hover:bg-red-500/40 border border-red-500/30"
        title="Stop">&#9632; Stop</button>`;

      const controls = isRunning
        ? btnPause + btnStop
        : (hasTime ? btnStart + btnStop : btnStart);

      // Goal display
      let goalSection = '';
      if (task.goal) {
        const pct = Math.min(100, (total / task.goal) * 100);
        const isComplete = total >= task.goal;
        goalSection = `
          <div class="mt-2.5 pt-2.5" style="border-top:1px solid rgba(255,255,255,0.05)">
            <div class="flex items-center gap-2 text-xs mb-1.5">
              <span class="text-slate-500 flex-shrink-0">Objective:</span>
              <span id="goal-pct-${task.id}" class="flex-1 ${isComplete ? 'text-emerald-400 font-semibold' : 'text-slate-400'}">${formatDuration(total)} / ${formatDuration(task.goal)}${isComplete ? ' \u2713' : ' (' + Math.round(pct) + '%)'}</span>
              <button onclick="openGoalInput('${task.id}')" class="text-slate-500 hover:text-purple-400 transition" title="Edit objective">&#9998;</button>
              <button onclick="removeGoal('${pid}','${task.id}')" class="text-slate-500 hover:text-red-400 transition" title="Remove objective">&times;</button>
            </div>
            <div class="w-full h-1.5 rounded-full bg-slate-700/70">
              <div id="goal-bar-${task.id}" class="h-1.5 rounded-full transition-all duration-300 ${isComplete ? 'bg-emerald-400' : 'bg-purple-500'}" style="width:${pct.toFixed(1)}%"></div>
            </div>
          </div>`;
      }

      // Goal input (hidden by default)
      const goalCurrentHours = task.goal ? (task.goal / 3600000).toFixed(1) : '';
      const goalInputSection = `
        <div id="goal-input-${task.id}" class="hidden mt-2.5 pt-2.5 items-center gap-2 flex-wrap" style="border-top:1px solid rgba(255,255,255,0.05)">
          <span class="text-xs text-slate-400 flex-shrink-0">Objective (hours):</span>
          <input type="number" id="goal-hours-${task.id}" min="0.1" step="0.5" value="${goalCurrentHours}" placeholder="e.g. 25"
            style="width:90px; padding:2px 8px; background:rgba(15,15,26,0.8); border:1px solid rgba(168,85,247,0.3); color:#e2e8f0; border-radius:0.5rem; outline:none;"
            onkeydown="if(event.key==='Enter') saveGoal('${pid}','${task.id}'); if(event.key==='Escape') cancelGoal('${task.id}')" />
          <button onclick="saveGoal('${pid}','${task.id}')"
            class="text-xs px-3 py-1 rounded-lg bg-purple-500/30 text-purple-300 hover:bg-purple-500/50 border border-purple-500/30 transition">Save</button>
          <button onclick="cancelGoal('${task.id}')"
            class="text-xs text-slate-500 hover:text-slate-300 transition">Cancel</button>
        </div>`;

      const setGoalBtn = !task.goal
        ? `<button onclick="openGoalInput('${task.id}')"
            class="flex items-center gap-1 text-xs px-3 py-1.5 rounded-lg font-medium transition
                   bg-purple-500/20 text-purple-400 hover:bg-purple-500/40 border border-purple-500/30"
            title="Set objective">&#127919; Goal</button>`
        : '';

      return `
        <div class="task-row rounded-xl px-4 py-3 ${isRunning ? 'running' : ''}">
          <div class="flex items-center gap-3 flex-wrap">
            <div class="flex-1 min-w-0 flex items-center gap-2">
              <span id="tname-${task.id}" class="text-sm text-slate-200 truncate cursor-pointer hover:text-purple-300 transition"
                ondblclick="startEditTask('${task.id}')" title="Double-click to edit">${esc(task.name)}</span>
              <input id="tedit-${task.id}" type="text" value="${esc(task.name)}"
                class="hidden text-sm flex-1" aria-label="Edit task name"
                style="max-width:300px; padding:2px 8px;"
                onkeydown="if(event.key==='Enter') commitEditTask('${task.id}'); if(event.key==='Escape') cancelEditTask('${task.id}')"
                onblur="commitEditTask('${task.id}')" />
              <button onclick="startEditTask('${task.id}')"
                class="text-slate-500 hover:text-purple-400 transition flex-shrink-0 text-base" title="Edit task name">&#9998;</button>
            </div>
            <div class="flex items-center gap-2 flex-shrink-0">
              ${isRunning ? `<span class="w-2 h-2 rounded-full bg-teal-400 pulse-ring flex-shrink-0"></span>` : ''}
              <span id="timer-${task.id}" class="text-sm font-mono font-bold timer-badge ${isRunning ? 'text-teal-400' : 'text-slate-400'}">${formatDuration(total)}</span>
            </div>
            <div class="flex items-center gap-2 flex-shrink-0">
              ${controls}
              ${setGoalBtn}
              <button onclick="deleteTask('${pid}','${task.id}')"
                class="text-slate-600 hover:text-red-400 transition text-base leading-none flex-shrink-0" title="Delete task" aria-label="Delete task">&times;</button>
            </div>
          </div>
          ${goalSection}
          ${goalInputSection}
        </div>`;
    }

    // ── Keyboard shortcuts ───────────────────────────────────────────────────
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') {
        closeProjectModal();
        closeConfirmModal();
      }
    });

    // ── Init ─────────────────────────────────────────────────────────────────
    loadData();

    // Restore any open session (tab reload / app reopen)
    // Find a task with an open session (end === null)
    outer: for (const project of data.projects) {
      for (const task of project.tasks) {
        const last = task.sessions[task.sessions.length - 1];
        if (last && !last.end) {
          activeTaskId    = task.id;
          activeProjectId = project.id;
          startTimerLoop();
          break outer;
        }
      }
    }

    render();
  </script>
</body>
</html>
